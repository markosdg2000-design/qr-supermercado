<script src="https://unpkg.com/html5-qrcode"></script>
<script>
  const $ = (id) => document.getElementById(id);
  const state = {
    currentSerie: localStorage.getItem('serie') || '',
    currentModel: localStorage.getItem('model') || '',
    currentStation: (localStorage.getItem('gr_station') || 'ES0304').toUpperCase(),
    data: null,
    dataLoaded: false,
    records: JSON.parse(localStorage.getItem('grandes_registros') || '[]'),
    scannerRunning: false,
    handlingScan: false,
    lastScanText: '',
    lastScanAt: 0,
    pendingQr: '',
    pendingEntries: [],
    html5Scanner: null,
    detector: null,
    mediaStream: null,
    detectorLoopId: 0,
  };

  const GRANDES_DATA_URL = './data/grandes.json?v=20260317';

  function showErr(text=''){ $('err').textContent = text; }
  function setStatus(text=''){ $('status').textContent = text; }
  function setScanState(text, ok=false){ const el=$('scanState'); el.textContent=text; el.className='pill ' + (ok ? 'ok' : 'bad'); }
  function setCameraState(text){ $('cameraState').textContent = text; }
  function setDataState(text, ok=false){ const el=$('dataState'); el.textContent=text; el.className='pill ' + (ok ? 'ok' : 'bad'); }
  function vib(ok){ try{ navigator.vibrate && navigator.vibrate(ok ? 50 : [35,50,35]); }catch(_){} }

  function cocheFromSerie(serieStr){
    const s = Number(String(serieStr).trim());
    if (!Number.isFinite(s)) return '';
    if ((s>=61501000 && s<61502000) || (s>=61551000 && s<61552000)) return 'C130';
    if ((s>=61502000 && s<61503000) || (s>=61552000 && s<61553000)) return 'C210';
    if ((s>=61503000 && s<61504000) || (s>=61553000 && s<61554000)) return 'C310';
    if ((s>=61504000 && s<61505000) || (s>=61554000 && s<=61555000)) return 'C120';
    return '';
  }

  function normalizeBloqueBol(v){
    const s = String(v || '').trim().toUpperCase();
    if (!s) return '—';
    if (s.includes('CARPA')) return 'CARPA';
    if (s.includes('MANUR')) return 'MANURACK';
    if (s.includes('VERTICAL')) return 'VERTICAL';
    return s;
  }

  function normalizeUbicacion(v){
    const s = String(v || '').trim().toUpperCase();
    return s || '—';
  }

  function getDiaSec(entry){
    const raw = entry?.DiaSec ?? entry?.DiaSecuencia ?? entry?.['Dia Sec.'] ?? entry?.['Día Sec.'] ?? '';
    const value = String(raw ?? '').trim();
    return value && value !== '0' ? value : '—';
  }

  function setHeader(){
    $('hdr').innerHTML = `Estación: ${state.currentStation || '—'} | Serie: ${state.currentSerie || '—'} | Modelo: ${state.currentModel || '—'} <span class="pill">cámara embebida</span>`;
  }

  function setStation(st){
    state.currentStation = (st || 'ES0304').toUpperCase();
    localStorage.setItem('gr_station', state.currentStation);
    $('stationSwitch').dataset.on = String(state.currentStation === 'ES05');
    setHeader();
  }

  function getModelsForCurrentStation(){
    const data = state.data || {};
    if (data?.stations?.[state.currentStation]?.models) return data.stations[state.currentStation].models;
    if (data?.models) return data.models;
    if (data?.[state.currentStation]) return data[state.currentStation];
    return {};
  }

  async function loadData(){
    state.dataLoaded = false;
    state.data = null;
    setDataState('Datos: cargando…');
    showErr('');

    const candidateStorageKeys = [
      'qr_data_grandes',
      'grandes_json',
      'grandesData',
      'qr_supermercado_grandes'
    ];

    for (const key of candidateStorageKeys) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) continue;

        const parsed = JSON.parse(raw);
        if (parsed && typeof parsed === 'object') {
          state.data = parsed;
          state.dataLoaded = true;
          setDataState(`Datos: localStorage (${key})`, true);
          console.log('[GRANDES] Datos cargados desde localStorage:', key, parsed);
          return;
        }
      } catch (err) {
        console.warn(`[GRANDES] localStorage inválido en clave ${key}:`, err);
      }
    }

    try {
      console.log('[GRANDES] Intentando cargar:', GRANDES_DATA_URL);
      const resp = await fetch(GRANDES_DATA_URL, { cache: 'no-store' });
      console.log('[GRANDES] Respuesta fetch:', resp.status, resp.ok, resp.url);

      if (!resp.ok) {
        throw new Error(`HTTP ${resp.status}`);
      }

      const text = await resp.text();
      if (!text || !text.trim()) {
        throw new Error('archivo vacío');
      }

      let json;
      try {
        json = JSON.parse(text);
      } catch (parseErr) {
        throw new Error(`JSON inválido: ${parseErr.message}`);
      }

      if (!json || typeof json !== 'object') {
        throw new Error('estructura JSON no válida');
      }

      state.data = json;
      state.dataLoaded = true;
      setDataState('Datos: grandes.json', true);

      try {
        localStorage.setItem('qr_data_grandes', JSON.stringify(json));
      } catch (_) {}

      console.log('[GRANDES] Datos cargados correctamente desde grandes.json', json);
    } catch (err) {
      console.error('[GRANDES] Error cargando grandes.json:', err);
      state.dataLoaded = false;
      state.data = null;
      setDataState('Datos: error');
      showErr(`No se ha podido cargar grandes.json (${err.message}). Revisa que exista /data/grandes.json y fuerza recarga de la PWA.`);
    }
  }

  function renderRecords(){
    const tbody = $('tbody');
    tbody.innerHTML = '';
    state.records.forEach((r, i) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${i+1}</td><td>${escapeHtml(r.codigo)}</td><td>${escapeHtml(r.serie)}</td><td>${escapeHtml(r.modelo)}</td><td>${escapeHtml(r.estacion)}</td><td>${escapeHtml(r.detalle)}</td><td>${escapeHtml(r.hora)}</td>`;
      tbody.appendChild(tr);
    });
  }

  function escapeHtml(text){
    return String(text ?? '').replace(/[&<>"']/g, (ch) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
  }

  function saveRecords(){
    localStorage.setItem('grandes_registros', JSON.stringify(state.records.slice(-300)));
  }

  function appendRecord(qr, entry){
    const row = {
      codigo: qr,
      serie: state.currentSerie,
      modelo: state.currentModel,
      estacion: state.currentStation,
      detalle: `${normalizeBloqueBol(entry?.BloqueBol)} · ${normalizeUbicacion(entry?.Ubicacion)} · ${entry?.Operacion || '—'}`,
      hora: new Intl.DateTimeFormat('es-ES', { hour:'2-digit', minute:'2-digit', second:'2-digit' }).format(new Date()),
    };
    state.records.unshift(row);
    state.records = state.records.slice(0, 300);
    saveRecords();
    renderRecords();
  }

  function setLastResult(qr, entry){
    $('lastQr').textContent = qr || '—';
    $('lastBloqueBol').textContent = normalizeBloqueBol(entry?.BloqueBol);
    $('lastUbicacion').textContent = normalizeUbicacion(entry?.Ubicacion);
    $('lastDia').textContent = getDiaSec(entry);
    $('lastOperacion').textContent = `Operación: ${entry?.Operacion || '—'}${entry?.InstruccionPrep ? ' | Prep: ' + entry.InstruccionPrep : ''}`;
  }

  function openOverlay(){ $('overlay').classList.add('show'); $('overlay').setAttribute('aria-hidden','false'); }
  function closeOverlay(){ $('overlay').classList.remove('show'); $('overlay').setAttribute('aria-hidden','true'); }

  function openSingleResult(qr, entry, notFound=false){
    $('singlePane').style.display = 'block';
    $('multiPane').style.display = 'none';
    $('dialogTitle').textContent = notFound ? 'QR no encontrado' : 'Componente encontrado';
    $('mBloqueBol').textContent = notFound ? 'NO ENCONTRADO' : normalizeBloqueBol(entry?.BloqueBol);
    $('mUbicacion').textContent = notFound ? '—' : normalizeUbicacion(entry?.Ubicacion);
    $('mDia').textContent = notFound ? '—' : getDiaSec(entry);
    $('mQr').textContent = qr || '—';
    $('mPrep').textContent = notFound
      ? `Ese código no tiene coincidencia para el modelo ${state.currentModel || '—'}. Revisa QR, serie o base de datos.`
      : `${entry?.Operacion || '—'}${entry?.InstruccionPrep ? ' | ' + entry.InstruccionPrep : ''}`;
    openOverlay();
  }

  function openMultiResult(qr, entries){
    $('singlePane').style.display = 'none';
    $('multiPane').style.display = 'block';
    $('dialogTitle').textContent = 'Varias coincidencias';
    const list = $('multiList');
    list.innerHTML = '';
    entries.forEach((entry) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'opBtn';
      btn.innerHTML = `${escapeHtml(entry?.Operacion || 'Sin operación')}<small>${escapeHtml(normalizeBloqueBol(entry?.BloqueBol))} · ${escapeHtml(normalizeUbicacion(entry?.Ubicacion))} · Día ${escapeHtml(getDiaSec(entry))}</small>`;
      btn.addEventListener('click', () => {
        appendRecord(qr, entry);
        setLastResult(qr, entry);
        openSingleResult(qr, entry, false);
      });
      list.appendChild(btn);
    });
    openOverlay();
  }

  function isDuplicateFastScan(text){
    const now = Date.now();
    const same = text === state.lastScanText && (now - state.lastScanAt) < 1500;
    state.lastScanText = text;
    state.lastScanAt = now;
    return same;
  }

  async function handleDecodedText(decodedText){
    const raw = String(decodedText || '').trim().toUpperCase();
    if (!raw || state.handlingScan) return;
    if (isDuplicateFastScan(raw)) return;
    state.handlingScan = true;
    await pauseScanner();

    const entries = getModelsForCurrentStation()?.[state.currentModel]?.[raw];
    state.pendingQr = raw;
    state.pendingEntries = Array.isArray(entries) ? entries : [];

    if (!state.pendingEntries.length){
      vib(false);
      setStatus('QR no encontrado.');
      openSingleResult(raw, null, true);
      return;
    }

    vib(true);
    if (state.pendingEntries.length === 1){
      const entry = state.pendingEntries[0];
      appendRecord(raw, entry);
      setLastResult(raw, entry);
      setStatus('Componente encontrado.');
      openSingleResult(raw, entry, false);
    } else {
      setStatus(`Coincidencias encontradas: ${state.pendingEntries.length}`);
      openMultiResult(raw, state.pendingEntries);
    }
  }

  async function closeModalAndResume(){
    closeOverlay();
    state.handlingScan = false;
    await resumeScanner();
    setStatus('Apunta al siguiente QR.');
  }

  async function stopDetectorLoop(){
    if (state.detectorLoopId){
      cancelAnimationFrame(state.detectorLoopId);
      state.detectorLoopId = 0;
    }
    if (state.mediaStream){
      state.mediaStream.getTracks().forEach(t => t.stop());
      state.mediaStream = null;
    }
    const reader = $('reader');
    reader.innerHTML = '';
  }

  async function stopHtml5(){
    if (state.html5Scanner && state.scannerRunning){
      try{ await state.html5Scanner.stop(); }catch(_){ }
      try{ await state.html5Scanner.clear(); }catch(_){ }
    }
  }

  async function stopScanner(){
    await stopDetectorLoop();
    await stopHtml5();
    state.scannerRunning = false;
    setScanState('Escáner detenido', false);
    setCameraState('Cámara: parada');
  }

  async function pauseScanner(){
    if (state.html5Scanner && typeof state.html5Scanner.pause === 'function'){
      try{ state.html5Scanner.pause(true); return; }catch(_){ }
    }
    if (state.mediaStream){
      state.mediaStream.getVideoTracks().forEach(t => t.enabled = false);
    }
  }

  async function resumeScanner(){
    if (state.html5Scanner && typeof state.html5Scanner.resume === 'function'){
      try{ state.html5Scanner.resume(); return; }catch(_){ }
    }
    if (state.mediaStream){
      state.mediaStream.getVideoTracks().forEach(t => t.enabled = true);
      if (!state.detectorLoopId) startBarcodeLoop();
    }
  }

  function startBarcodeLoop(){
    const video = $('reader').querySelector('video');
    if (!video || !state.detector) return;
    const tick = async () => {
      if (!state.mediaStream || state.handlingScan) {
        state.detectorLoopId = requestAnimationFrame(tick);
        return;
      }
      try{
        if (video.readyState >= 2){
          const codes = await state.detector.detect(video);
          if (codes?.length){
            const value = codes[0].rawValue;
            if (value) {
              await handleDecodedText(value);
            }
          }
        }
      }catch(_){ }
      state.detectorLoopId = requestAnimationFrame(tick);
    };
    state.detectorLoopId = requestAnimationFrame(tick);
  }

  async function startWithBarcodeDetector(){
    state.detector = new BarcodeDetector({ formats: ['qr_code'] });
    const stream = await navigator.mediaDevices.getUserMedia({
      audio:false,
      video:{ facingMode:{ ideal:'environment' }, width:{ ideal:1280 }, height:{ ideal:720 } }
    });
    state.mediaStream = stream;
    const video = document.createElement('video');
    video.setAttribute('playsinline', 'true');
    video.muted = true;
    video.autoplay = true;
    video.srcObject = stream;
    $('reader').innerHTML = '';
    $('reader').appendChild(video);
    await video.play();
    startBarcodeLoop();
  }

  async function startWithHtml5Qrcode(){
    if (!state.html5Scanner) state.html5Scanner = new Html5Qrcode('reader');
    const config = {
      fps: 14,
      rememberLastUsedCamera: true,
      qrbox: (w,h) => {
        const side = Math.max(180, Math.floor(Math.min(w,h) * 0.7));
        return { width: side, height: side };
      },
      aspectRatio: 1.333333,
      disableFlip: true,
    };
    try{
      await state.html5Scanner.start({ facingMode: { exact: 'environment' } }, config, handleDecodedText, () => {});
    }catch(_){
      await state.html5Scanner.start({ facingMode: 'environment' }, config, handleDecodedText, () => {});
    }
  }

  async function startScanner(){
    if (!state.dataLoaded){
      showErr('Los datos todavía no están cargados.');
      return;
    }
    if (!state.currentModel){
      showErr('Introduce un nº de serie válido.');
      return;
    }
    if (state.scannerRunning) return;

    $('readerWrap').style.display = 'block';
    showErr('');
    setStatus('Abriendo cámara...');
    setScanState('Escáner iniciando…');
    setCameraState('Cámara: solicitando permiso');

    try{
      await stopScanner();
      if ('BarcodeDetector' in window){
        await startWithBarcodeDetector();
        setCameraState('Cámara: trasera (rápida)');
      } else {
        await startWithHtml5Qrcode();
        setCameraState('Cámara: trasera');
      }
      state.scannerRunning = true;
      setScanState('Escaneando', true);
      setStatus('Apunta al QR del componente.');
    }catch(err){
      console.error(err);
      state.scannerRunning = false;
      setScanState('Fallo cámara', false);
      setCameraState('Cámara: error');
      setStatus('No se ha podido abrir la cámara.');
      showErr('No se ha podido abrir la cámara. Abre la PWA en HTTPS con Chrome o Edge y acepta permisos.');
    }
  }

  function processSerieValue(autoStart=true){
    const serie = $('serie').value.trim();
    const model = cocheFromSerie(serie);

    if (!serie){
      state.currentSerie = '';
      state.currentModel = '';
      localStorage.removeItem('serie');
      localStorage.removeItem('model');
      setHeader();
      showErr('');
      return;
    }
    if (!model){
      state.currentSerie = serie;
      state.currentModel = '';
      setHeader();
      showErr('Serie fuera de rango.');
      return;
    }

    state.currentSerie = serie;
    state.currentModel = model;
    localStorage.setItem('serie', serie);
    localStorage.setItem('model', model);
    setHeader();
    showErr('');
    if (autoStart) startScanner();
  }

  function buildPlainTableText(){
    const lines = ['#\tCódigo\tSerie\tModelo\tEstación\tDetalle\tHora'];
    state.records.forEach((r, i) => lines.push(`${i+1}\t${r.codigo}\t${r.serie}\t${r.modelo}\t${r.estacion}\t${r.detalle}\t${r.hora}`));
    return lines.join('\n');
  }

  async function copyTable(){
    const text = buildPlainTableText();
    try{ await navigator.clipboard.writeText(text); setStatus('Tabla copiada al portapapeles.'); }
    catch(_){ setStatus('No se pudo copiar automáticamente.'); }
  }

  function sendMail(){
    const subject = encodeURIComponent(`Resumen recepción GRANDES ${state.currentStation}`);
    const body = encodeURIComponent(buildPlainTableText());
    window.location.href = `mailto:?subject=${subject}&body=${body}`;
  }

  $('stationSwitch').addEventListener('click', () => setStation(state.currentStation === 'ES05' ? 'ES0304' : 'ES05'));
  $('serie').addEventListener('input', () => { if ($('serie').value.trim().length >= 8) processSerieValue(true); });
  $('start').addEventListener('click', () => processSerieValue(true));
  $('reset').addEventListener('click', async () => {
    await stopScanner();
    state.currentSerie = '';
    state.currentModel = '';
    state.handlingScan = false;
    state.pendingEntries = [];
    state.pendingQr = '';
    localStorage.removeItem('serie');
    localStorage.removeItem('model');
    $('serie').value = '';
    $('readerWrap').style.display = 'none';
    closeOverlay();
    $('lastQr').textContent = '—';
    $('lastBloqueBol').textContent = '—';
    $('lastUbicacion').textContent = '—';
    $('lastDia').textContent = '—';
    $('lastOperacion').textContent = 'Sin lecturas todavía.';
    setHeader();
    showErr('');
    setStatus('Listo.');
  });
  $('closeModalBtn').addEventListener('click', closeModalAndResume);
  $('continueBtn').addEventListener('click', closeModalAndResume);
  $('copyBtn').addEventListener('click', copyTable);
  $('mailBtn').addEventListener('click', sendMail);
  window.addEventListener('beforeunload', () => { stopScanner(); });

  async function bootstrap(){
    $('serie').value = state.currentSerie;
    setStation(state.currentStation);
    setHeader();
    renderRecords();
    setStatus(state.currentModel ? 'Modelo detectado. Cámara lista para arrancar.' : 'Introduce nº de serie.');
    await loadData();
    if (state.currentSerie && state.currentModel && state.dataLoaded){
      $('readerWrap').style.display = 'block';
      setTimeout(() => startScanner(), 250);
    }
  }

  bootstrap();
</script>
